# ─── ProFTPD Configuration for FT Test Example ───────────────────────────────
# This configuration demonstrates integration with cert-manager for TLS/SFTP
# Copyright IBM Corp. 2026 - 2026
# SPDX-License-Identifier: Apache-2.0

# ─── Modules ─────────────────────────────────────────────────────────────────
# mod_auth_file is compiled STATICALLY into Alpine's proftpd base package
LoadModule mod_tls.c
LoadModule mod_sftp.c

# ─── Global server identity ───────────────────────────────────────────────────
ServerName    "FT Test Double"
ServerType    standalone
DefaultServer on

# ─── Unprivileged process identity ───────────────────────────────────────────
User  ftpd
Group ftpdgrp

# ─── Main FTP listener (plain + STARTTLS) ────────────────────────────────────
Port         2121
PassivePorts 2180 2199

# ─── Virtual-user authentication ─────────────────────────────────────────────
AuthOrder          mod_auth_file.c
AuthUserFile       /etc/proftpd/ftppasswd
AuthGroupFile      /etc/proftpd/ftpgroup
PersistentPasswd   off
RequireValidShell  off

# ─── Chroot each user to their declared home directory ───────────────────────
DefaultRoot ~

# ─── Logging ─────────────────────────────────────────────────────────────────
TransferLog /var/log/proftpd/xferlog
SystemLog   /var/log/proftpd/proftpd.log

# Enable trace logging for debugging SFTP authentication issues
TraceLog    /var/log/proftpd/trace.log
Trace       sftp:20 ssh2:20

# ─── Global defaults ─────────────────────────────────────────────────────────
AllowOverwrite on
TimesGMT       off

# ─────────────────────────────────────────────────────────────────────────────
# Access control for the SHARED folder
# ftuser02 can read but not write to shared folder
# ─────────────────────────────────────────────────────────────────────────────
<Directory /home/ftuser02/shared>
  <Limit WRITE>
    DenyAll
  </Limit>
</Directory>

# ─────────────────────────────────────────────────────────────────────────────
# TLS configuration (mod_tls)
# Uses certificates generated by cert-manager
# ─────────────────────────────────────────────────────────────────────────────
<IfModule mod_tls.c>
  TLSEngine                on
  TLSLog                   /var/log/proftpd/tls.log
  TLSProtocol              TLSv1.2 TLSv1.3

  # RSA certificate from cert-manager (public cert from read-only mount)
  # Decrypted private key written to /tmp/proftpd-keys/ by entrypoint
  TLSRSACertificateFile    /etc/proftpd/certs/rsa/public.pem.cer
  TLSRSACertificateKeyFile /tmp/proftpd-keys/tls.rsa.key.pem

  TLSOptions               EnableDiags NoSessionReuseRequired
  TLSVerifyClient          off
  TLSRequired              off   # optional on port 2121
</IfModule>

# ─────────────────────────────────────────────────────────────────────────────
# Mandatory FTPS VirtualHost on port 2990
# ─────────────────────────────────────────────────────────────────────────────
<VirtualHost 0.0.0.0>
  Port 2990
  ServerName "FT Test Double – Mandatory FTPS"

  AuthOrder        mod_auth_file.c
  AuthUserFile     /etc/proftpd/ftppasswd
  AuthGroupFile    /etc/proftpd/ftpgroup
  PersistentPasswd off
  RequireValidShell off
  DefaultRoot      ~

  <IfModule mod_tls.c>
    TLSEngine                on
    TLSProtocol              TLSv1.2 TLSv1.3
    TLSRSACertificateFile    /etc/proftpd/certs/rsa/public.pem.cer
    TLSRSACertificateKeyFile /tmp/proftpd-keys/tls.rsa.key.pem
    TLSOptions               EnableDiags NoSessionReuseRequired
    TLSVerifyClient          off
    TLSRequired              on   # all commands MUST be over TLS
  </IfModule>
</VirtualHost>

# ─────────────────────────────────────────────────────────────────────────────
# SFTP VirtualHost on port 2222  (mod_sftp, no sshd required)
# Uses SSH host keys from cert-manager.
#
# Authentication methods:
#   - password:   always enabled (virtual users via ftppasswd)
#   - publickey:  enabled; client public keys are installed by the entrypoint
#                 into each user's ~/.ssh/authorized_keys
# ─────────────────────────────────────────────────────────────────────────────
<VirtualHost 0.0.0.0>
  Port 2222
  ServerName "FT Test Double – SFTP"

  AuthOrder        mod_auth_file.c
  AuthUserFile     /etc/proftpd/ftppasswd
  AuthGroupFile    /etc/proftpd/ftpgroup
  PersistentPasswd off
  RequireValidShell off
  DefaultRoot      ~

  <IfModule mod_sftp.c>
    SFTPEngine   on
    SFTPLog      /var/log/proftpd/sftp.log

    # SSH host keys written to /tmp/proftpd-keys/ by entrypoint (writable)
    # RSA host key is always present (generated fresh by entrypoint)
    SFTPHostKey  /tmp/proftpd-keys/ssh_host_rsa_key
    # ED25519 host key: in pq-hybrid mode this is decrypted from cert-manager;
    # in classical mode the entrypoint generates a throw-away key so ProFTPD
    # can start (ProFTPD fatally fails if a listed SFTPHostKey file is absent).
    SFTPHostKey  /tmp/proftpd-keys/ssh_host_ed25519_key

    # Accept both password and public-key authentication
    SFTPAuthMethods        password publickey
    # Resolve authorized_keys from the virtual user's home directory
    # ProFTPD mod_sftp requires RFC4716 format and checks files in order
    SFTPAuthorizedUserKeys file:~/.ssh/authorized_keys

    SFTPCompression delayed
  </IfModule>
</VirtualHost>

