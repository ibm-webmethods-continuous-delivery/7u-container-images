# Copyright IBM Corp. 2026 - 2026
# SPDX-License-Identifier: Apache-2.0
#
# Architecture:
#   cert-manager             - generates server TLS certs + client SSH key pairs
#   ft-test-double-classical - ProFTPD in classical (pre-quantum) TLS mode
#   ft-test-double-pq-hybrid - ProFTPD in post-quantum hybrid TLS mode
#   ft-test-client           - runs all scenario combinations against both doubles

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # Certificate Manager
  # Generates server TLS certificates and client SSH key pairs before any
  # other service starts.
  # ═══════════════════════════════════════════════════════════════════════════
  cert-manager:
    image: iwcd-cert-manager-u:alpine
    container_name: ft-test-cert-manager
    volumes:
      - ./data/subjects:/mnt/data/certmgr
      - ./scripts/cert-manager-entrypoint.sh:/entrypoint.sh:ro
      - cert-manager-home:/home/certmgr
      - cert-manager-tmp:/tmp
    read_only: true
    environment:
      # TEST_PK_SECRET is the harness-level passphrase used by all subjects.
      # Each subject's set-env.sh resolves CRTMGR_PK_PASS from this variable,
      # keeping per-subject scope while enabling fully unattended operation.
      - TEST_PK_SECRET=TestOnly123
    command: ["/bin/sh", "/entrypoint.sh"]
    healthcheck:
      # Ready when both the server RSA cert and the ED25519 client key exist
      test:
        - "CMD"
        - "sh"
        - "-c"
        - >-
          test -f /mnt/data/certmgr/01-ft-test/02-ft-server/out/rsa/public.pem.cer &&
          test -f /mnt/data/certmgr/01-ft-test/03-ft-client-keys/ed25519/id_client
      interval: 2s
      timeout: 5s
      retries: 30
    networks:
      - ft-test-net

  # ═══════════════════════════════════════════════════════════════════════════
  # FTP Test Double – Classical (Pre-Quantum)
  # ProFTPD with classical TLS (RSA + ECDHE) and RSA SFTP host key.
  # Ports: 2121 (FTP/FTPES), 2990 (FTPS implicit), 2222 (SFTP)
  # ═══════════════════════════════════════════════════════════════════════════
  ft-test-double-classical:
    image: iwcd-ft-test-double-u:alpine
    container_name: ft-test-double-classical
    depends_on:
      cert-manager:
        condition: service_healthy
    ports:
      - "2121:2121"         # FTP (plain + STARTTLS / FTPES)
      - "2222:2222"         # SFTP
      - "2990:2990"         # FTPS implicit
      - "2180-2199:2180-2199"  # Passive data ports
    volumes:
      - ./scripts/ft-test-double-entrypoint.sh:/entrypoint.sh:ro
      - ./config/proftpd.conf:/etc/proftpd/proftpd.conf:ro
      - ./config:/etc/ft-test/config:ro
      # Server TLS certificates (RSA)
      - ./data/subjects/01-ft-test/02-ft-server/out/rsa:/etc/proftpd/certs/rsa:ro
      # SSH host keys (ED25519 from cert-manager; RSA generated by entrypoint)
      - ./data/subjects/01-ft-test/02-ft-server/out/ed25519:/etc/proftpd/ssh:ro
      # Client public keys (for SFTP authorized_keys installation)
      - ./data/subjects/01-ft-test/03-ft-client-keys:/run/secrets/ft-client-keys:ro
      - ft-logs-classical:/var/log/proftpd
      - ft-user01-home-classical:/home/ftuser01
      - ft-user02-home-classical:/home/ftuser02
      - ft-shared-classical:/home/ftuser01/shared
      - ft-shared-classical:/home/ftuser02/shared:ro
    environment:
      - CRTMGR_PK_PASS=TestOnly123   # passphrase for server TLS private key decryption
      - FT_SFTP_KEY_TYPE=rsa
      - FT_TLS_MODE=classical
      - OPENSSL_CONF=/etc/ft-test/config/openssl-classical.cnf
    entrypoint: /entrypoint.sh
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2121"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      ft-test-net:
        aliases:
          - ft-test-double-classical

  # ═══════════════════════════════════════════════════════════════════════════
  # FTP Test Double – PQ Hybrid
  # ProFTPD with post-quantum hybrid TLS (x25519_kyber768 KEX, RSA cert auth)
  # and ED25519 SFTP host key. KEX is quantum-hardened; auth is classical.
  # Future: ft-test-double-pq-full will add Dilithium3 cert for full PQ auth.
  # Ports: 3121 (FTP/FTPES), 3990 (FTPS implicit), 3222 (SFTP)
  # ═══════════════════════════════════════════════════════════════════════════
  ft-test-double-pq-hybrid:
    image: iwcd-ft-test-double-u:alpine
    container_name: ft-test-double-pq-hybrid
    depends_on:
      cert-manager:
        condition: service_healthy
    ports:
      - "3121:2121"         # FTP (plain + STARTTLS / FTPES)
      - "3222:2222"         # SFTP
      - "3990:2990"         # FTPS implicit
      - "3180-3199:2180-2199"  # Passive data ports
    volumes:
      - ./scripts/ft-test-double-entrypoint.sh:/entrypoint.sh:ro
      - ./config/proftpd.conf:/etc/proftpd/proftpd.conf:ro
      - ./config:/etc/ft-test/config:ro
      # Server TLS certificates (RSA)
      - ./data/subjects/01-ft-test/02-ft-server/out/rsa:/etc/proftpd/certs/rsa:ro
      # SSH host keys (ED25519 from cert-manager; RSA generated by entrypoint)
      - ./data/subjects/01-ft-test/02-ft-server/out/ed25519:/etc/proftpd/ssh:ro
      # Client public keys (for SFTP authorized_keys installation)
      - ./data/subjects/01-ft-test/03-ft-client-keys:/run/secrets/ft-client-keys:ro
      - ft-logs-pq-hybrid:/var/log/proftpd
      - ft-user01-home-pq-hybrid:/home/ftuser01
      - ft-user02-home-pq-hybrid:/home/ftuser02
      - ft-shared-pq-hybrid:/home/ftuser01/shared
      - ft-shared-pq-hybrid:/home/ftuser02/shared:ro
    environment:
      - CRTMGR_PK_PASS=TestOnly123   # passphrase for server TLS private key decryption
      - FT_SFTP_KEY_TYPE=ed25519
      - FT_TLS_MODE=pq-hybrid
      - OPENSSL_CONF=/etc/ft-test/config/openssl-pq-hybrid.cnf
    entrypoint: /entrypoint.sh
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2121"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      ft-test-net:
        aliases:
          - ft-test-double-pq-hybrid

  # ═══════════════════════════════════════════════════════════════════════════
  # FTP Test Client
  # Runs all scenario combinations against both test-double services.
  # One service instance; the run-scenarios.sh script iterates all combos.
  # ═══════════════════════════════════════════════════════════════════════════
  ft-test-client:
    image: iwcd-ft-test-client-u:alpine
    container_name: ft-test-client
    depends_on:
      cert-manager:
        condition: service_healthy
      ft-test-double-classical:
        condition: service_healthy
      ft-test-double-pq-hybrid:
        condition: service_healthy
    volumes:
      # Harness runner script (injected from the test harness, not the image)
      - ./scripts/run-scenarios.sh:/opt/ft-test-client/scripts/run-scenarios.sh:ro
      # Client SSH key pairs generated by cert-manager
      - ./data/subjects/01-ft-test/03-ft-client-keys:/run/secrets/ft-test-client:ro
      # CA certificate bundle for TLS verification (optional; ssl:verify-certificate no by default)
      - ./data/subjects/01-ft-test/01-ca-ft-test/out/rsa:/run/secrets/ft-ca:ro
      - test-results:/results
    environment:
      # Default credentials (used by all combinations unless overridden by runner)
      # These MUST match the ones used at docker build time for the image
      - FTC_USER=ftuser01
      - FTC_PASS=Manage01
      - FTC_RO_USER=ftuser02
      - FTC_RO_PASS=Manage01
      # ftuser01 uploads to "shared" so ftuser02 can read it from "shared".
      # Both users are chrooted to their own home; "shared" is relative to chroot root.
      # ftuser01: /home/ftuser01/shared (writable named volume)
      # ftuser02: /home/ftuser02/shared (same named volume, mounted :ro)
      - FTC_REMOTE_UPLOAD_DIR=shared
      - FTC_REMOTE_RO_DIR=shared
      - FTC_SSH_KEYS_HOME=/run/secrets/ft-test-client
      - FTC_SSH_KEY_FILENAME=id_client
      # The runner script overrides FTC_HOST, FTC_PORT, FTC_PROTOCOL, FTC_KEY_TYPE
      # per combination, so these are just fallback defaults.
      - FTC_HOST=ft-test-double-classical
      - FTC_PORT=2121
      - FTC_PROTOCOL=ftp
      - FTC_KEY_TYPE=rsa
      - FTC_TRANSFER_MODE=binary
    command: ["/bin/sh", "-c", "/opt/ft-test-client/scripts/run-scenarios.sh; echo 'Tests complete. Container will stay running for inspection.'; sleep infinity"]
    networks:
      - ft-test-net

# ═══════════════════════════════════════════════════════════════════════════
# Networks
# ═══════════════════════════════════════════════════════════════════════════
networks:
  ft-test-net:
    driver: bridge

# ═══════════════════════════════════════════════════════════════════════════
# Volumes
# ═══════════════════════════════════════════════════════════════════════════
volumes:
  cert-manager-home:
  cert-manager-tmp:
  ft-logs-classical:
  ft-logs-pq-hybrid:
  ft-user01-home-classical:
  ft-user02-home-classical:
  ft-shared-classical:
  ft-user01-home-pq-hybrid:
  ft-user02-home-pq-hybrid:
  ft-shared-pq-hybrid:
  test-results:

